<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Recip-Ease{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons — used for clock/fire/people on recipe detail and save/star on dashboard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- re-navbar overrides bg-dark with the brand forest green defined in style.css -->
  <nav class="navbar navbar-expand-lg navbar-dark re-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Recip-Ease</a>
      <div class="navbar-nav ms-auto">
        <!-- request.path is available in all Flask templates automatically;
             adding 'active' here means the current page is always highlighted -->
        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Recipes</a>
        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a>
        <a class="nav-link {% if request.path == '/recommendations' %}active{% endif %}" href="/recommendations">For You</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Auto-dismiss flash alerts after 3 seconds so they don't sit on the page
    // indefinitely. The Bootstrap fade class handles the visual transition.
    // 3s is long enough to read but short enough not to feel sticky.
    setTimeout(function () {
      document.querySelectorAll('.alert').forEach(function (el) {
        var bsAlert = bootstrap.Alert.getOrCreateInstance(el);
        bsAlert.close();
      });
    }, 3000);
  </script>

</body>
</html>
